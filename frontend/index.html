<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Meus Itens</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-layer-group"></i>
            <span>Nexus<strong>Catálogo</strong></span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Início</a>
            <a href="cadastro.html" class="btn-primary">Novo Item <i class="fa-solid fa-plus"></i></a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Seus Itens Cadastrados</h1>
            <p>Gerencie seus filmes, músicas e produtos favoritos em um só lugar.</p>
        </header>

        <div class="controls">
            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar itens...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="Product">Produtos</button>
                <button class="filter-btn" data-filter="Movie">Filmes</button>
                <button class="filter-btn" data-filter="Music">Músicas</button>
            </div>
        </div>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Carregando catálogo...</p>
        </div>

        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon"><i class="fa-solid fa-box-open"></i></div>
            <h2>Nenhum item encontrado</h2>
            <p>Parece que o seu catálogo está vazio no momento.</p>
            <a href="cadastro.html" class="btn-secondary">Cadastrar Primeiro Item</a>
        </div>

        <div class="grid" id="itemsGrid">
            <!-- Items will be dynamically injected here -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
