<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Nexus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-layer-group"></i>
            <span>Nexus<strong>Catálogo</strong></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Início</a>
            <a href="cadastro.html" class="btn-primary active">Novo Item <i class="fa-solid fa-plus"></i></a>
        </div>
    </nav>

    <main class="container form-page">
        <header class="page-header center">
            <h1>Cadastrar Novo Item</h1>
            <p>Adicione um novo produto, filme ou música ao seu catálogo.</p>
        </header>

        <div class="card glass-form">
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="name">Nome do Item <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required
                        placeholder="Ex: O Senhor dos Anéis, iPhone 15...">
                </div>

                <div class="form-row">
                    <div class="form-group group-half">
                        <label for="category">Categoria <span class="required">*</span></label>
                        <select id="category" name="category" required>
                            <option value="" disabled selected>Selecione uma categoria</option>
                            <option value="Product">Produto Físico/Digital</option>
                            <option value="Movie">Filme/Série</option>
                            <option value="Music">Música/Álbum</option>
                        </select>
                    </div>

                    <div class="form-group group-half">
                        <label for="price">Preço R$ <small>(Opcional)</small></label>
                        <input type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00">
                    </div>
                </div>

                <div class="form-group">
                    <label for="imageUrl">URL da Imagem <small>(Opcional)</small></label>
                    <input type="url" id="imageUrl" name="imageUrl" placeholder="https://exemplo.com/imagem.png">
                </div>

                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" name="description" rows="4"
                        placeholder="Adicione detalhes sobre o item..."></textarea>
                </div>

                <div class="form-actions">
                    <a href="index.html" class="btn-secondary">Cancelar</a>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span>Cadastrar Item</span>
                        <i class="fa-solid fa-check"></i>
                    </button>
                </div>

                <div id="toastMessage" class="toast hidden"></div>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
